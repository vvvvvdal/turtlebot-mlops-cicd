name: Turtlebot (MLOps - CI/CD)

on:
  push:
    branches: [main]

jobs:
  teste_navegacao_turtlesim:
    runs-on: ubuntu-latest

    # Roda tudo dentro da imagem oficial do ROS 2 Humble
    container:
      image: osrf/ros:humble-desktop
      options: --shm-size=512m

    # Ollama sobe como serviço paralelo, acessível via hostname "ollama"
    services:
      ollama:
        image: ollama/ollama
        ports:
          - 11434:11434

    env:
      DISPLAY: :99
      OLLAMA_HOST: http://ollama:11434
      PYTHONPATH: src

    steps:
      - name: 1. Baixar o código do repositório
        uses: actions/checkout@v4

      - name: 2. Instalar Xvfb e dependências Python
        run: |
          apt-get update -q
          apt-get install -y -q xvfb python3-pip
          pip3 install --quiet ollama opencv-python-headless

      - name: 3. Iniciar display virtual (Xvfb)
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 1

      - name: 4. Aguardar Ollama e fazer pull do modelo
        run: |
          echo "Aguardando Ollama ficar pronto..."
          for i in $(seq 1 15); do
            curl -sf http://ollama:11434/api/tags && break
            sleep 2
          done

          echo "Fazendo pull do modelo..."
          curl -X POST http://ollama:11434/api/pull \
            -H "Content-Type: application/json" \
            -d '{"name": "qwen2.5:1.5b"}' \
            --no-buffer

      - name: 5. Iniciar turtlesim em background
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          ros2 launch src/turtlesim_teste.py &
          sleep 4

      - name: 6. Executar navegação autônoma (CI/CD gate)
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          python3 src/turtlesim_teste.py
        # sys.exit(0) = aprovado. pipeline verde
        # sys.exit(1) = reprovado. pipeline vermelho e bloqueia deploy