name: Turtlebot (MLOps - CI/CD)

# Dispara o pipeline a cada push na branch main
on:
  push:
    branches: [main]

jobs:
  teste_navegacao_turtlesim:
    runs-on: ubuntu-latest

    # Necessário para o CI Bot fazer git push no step 7 (CD)
    permissions:
      contents: write

    # Roda todos os steps dentro da imagem oficial do ROS 2 Humble
    # --shm-size=512m evita crashes de memória compartilhada do turtlesim
    container:
      image: osrf/ros:humble-desktop
      options: --shm-size=512m

    # Ollama sobe como serviço paralelo acessível via hostname "ollama"
    # O modelo de IA roda localmente, sem depender de APIs externas
    services:
      ollama:
        image: ollama/ollama
        ports:
          - 11434:11434

    env:
      # Display virtual para o turtlesim renderizar
      DISPLAY: :99
      # Aponta o cliente Ollama para o serviço paralelo
      OLLAMA_HOST: http://ollama:11434
      # Permite imports diretos dos módulos em src/
      PYTHONPATH: src

    steps:
      - name: 1. Baixar o código do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache dependências Python (pip)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-


      - name: 2. Ler peso do modelo do arquivo peso.txt
        run: |
          # peso.txt controla a qualidade do modelo: >= 8 passa, < 8 reprova
          PESO=$(cat peso.txt | tr -d '[:space:]')
          echo "Peso lido: $PESO"
          # Exporta o peso como variável de ambiente para o Python ler via os.getenv()
          echo "PESO_MODELO=$PESO" >> $GITHUB_ENV

      - name: 3. Instalar Xvfb e dependências Python
        run: |
          apt-get update -q
          # Xvfb cria um display virtual para o turtlesim abrir sem monitor físico
          apt-get install -y -q xvfb python3-pip
          pip3 install --quiet -r requirements.txt

      - name: 4. Iniciar display virtual (Xvfb)
        run: |
          # Sobe o display virtual em background na porta :99
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 1

      - name: 5. Aguardar Ollama e fazer pull do modelo
        run: |
          echo "Aguardando Ollama ficar pronto..."
          # Tenta conectar ao Ollama por até 30 segundos (15 tentativas x 2s)
          for i in $(seq 1 15); do
            curl -sf http://ollama:11434/api/tags && break
            sleep 2
          done

          echo "Fazendo pull do modelo..."
          # Baixa o modelo via API HTTP (CLI ollama não está disponível no container ROS)
          curl -X POST http://ollama:11434/api/pull \
            -H "Content-Type: application/json" \
            -d '{"name": "qwen2.5:1.5b"}' \
            --no-buffer

      - name: 6. (CI) Executar navegação autônoma
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          # O robô navega pelo mapa com o agente de IA tomando decisões
          # sys.exit(0) = chegou ao destino sem colidir  -> pipeline verde, step 7 executa
          # sys.exit(1) = colidiu ou alucionou           -> pipeline vermelho, deploy bloqueado
          python3 src/turtlesim_teste.py

      - name: 7. (CD) Aprovar modelo para deploy físico
        # Só executa se o step 6 retornou exit code 0 (navegação aprovada)
        # Registra o deploy aprovado com timestamp e peso no log de auditoria
        if: success()
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          echo "Modelo aprovado em $(date)" >> deployments.log
          echo "peso=$(cat peso.txt)" >> deployments.log
          git config user.email "ci@github.com"
          git config user.name "CI Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add deployments.log
          git commit -m "Peso $(cat peso.txt). Modelo aprovado. Deploy liberado para o robô físico."
          git push
